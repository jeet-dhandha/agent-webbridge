<!--
  popup.html — Agent WebBridge browser-action popup.
  Opening this page wakes the MV3 service worker; popup.js then sends GET_STATUS.
  Shows the live connection status plus Connect / Disconnect controls.
  Filename is load-bearing: the fleet's wakeExtension opens
  chrome-extension://<id>/popup.html — do not rename.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent WebBridge</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        width: 260px;
        margin: 0;
        padding: 16px;
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 14px;
        font-weight: 600;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #9aa0a6;
        flex: none;
      }
      .dot.on {
        background: #34a853;
      }
      .dot.off {
        background: #ea4335;
      }
      #statusText {
        font-weight: 500;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      button {
        flex: 1;
        padding: 7px 10px;
        font-size: 13px;
        border: 1px solid rgba(128, 128, 128, 0.4);
        border-radius: 6px;
        background: transparent;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.45;
        cursor: default;
      }
      button:not(:disabled):hover {
        background: rgba(128, 128, 128, 0.12);
      }
    </style>
  </head>
  <body>
    <h1>Agent WebBridge</h1>
    <div class="status">
      <span id="dot" class="dot"></span>
      <span id="statusText">Checking…</span>
    </div>
    <div class="actions">
      <button id="connect" disabled>Connect</button>
      <button id="disconnect" disabled>Disconnect</button>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
