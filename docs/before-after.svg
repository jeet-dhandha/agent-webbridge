<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <style>
      .h{font-size:20px;font-weight:700}
      .lbl{font-size:14px;font-weight:600;fill:#0f172a}
      .lbl2{font-size:12.5px;fill:#475569}
      .port{font-size:13px;font-weight:700;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
      .tag{font-size:12px;font-weight:700}
    </style>
  </defs>

  <rect x="0" y="0" width="1120" height="520" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ===== BEFORE ===== -->
  <rect x="40" y="40" width="490" height="440" rx="14" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
  <text x="64" y="78" class="h" fill="#b91c1c">Stock Kimi WebBridge</text>
  <text x="64" y="104" class="lbl2">One daemon. One slot. One profile — the rest are rejected.</text>

  <rect x="180" y="140" width="210" height="60" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="285" y="166" class="lbl" text-anchor="middle">daemon</text>
  <text x="285" y="186" class="port" text-anchor="middle" fill="#2563eb">:10086 — 1 slot</text>

  <!-- one connected -->
  <rect x="80" y="280" width="180" height="56" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="170" y="304" class="lbl" text-anchor="middle">Profile A</text>
  <text x="170" y="324" class="lbl2" text-anchor="middle">connected ✓</text>
  <line x1="225" y1="280" x2="270" y2="202" stroke="#16a34a" stroke-width="2.5" marker-end="url(#a2)"/>

  <!-- rejected -->
  <rect x="310" y="280" width="180" height="56" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="400" y="304" class="lbl" text-anchor="middle">Profile B</text>
  <text x="400" y="324" class="lbl2" text-anchor="middle" fill="#b91c1c">rejected every 5s ✗</text>
  <line x1="360" y1="280" x2="305" y2="202" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="5 4"/>
  <text x="332" y="250" class="tag" fill="#b91c1c">⃠</text>

  <rect x="80" y="392" width="410" height="56" rx="10" fill="#ffffff" stroke="#fecaca" stroke-width="1.5"/>
  <text x="100" y="416" class="lbl2">Want to switch? Quit the holding Chrome or toggle its extension off,</text>
  <text x="100" y="434" class="lbl2">wait ~5s for the next profile to grab the slot. Manual. One at a time.</text>

  <!-- ===== AFTER ===== -->
  <rect x="590" y="40" width="490" height="440" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
  <text x="614" y="78" class="h" fill="#15803d">kimi-webbridge-fleet</text>
  <text x="614" y="104" class="lbl2">One daemon per profile. A router up front. All live at once.</text>

  <rect x="700" y="140" width="270" height="56" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="835" y="164" class="lbl" text-anchor="middle">router :10086</text>
  <text x="835" y="183" class="lbl2" text-anchor="middle">routes by profile</text>

  <!-- three live -->
  <g>
    <rect x="612" y="280" width="140" height="78" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="682" y="306" class="lbl" text-anchor="middle">Profile A</text>
    <text x="682" y="326" class="port" text-anchor="middle" fill="#16a34a">:13222</text>
    <text x="682" y="345" class="lbl2" text-anchor="middle">live ✓</text>
    <line x1="700" y1="280" x2="780" y2="198" stroke="#16a34a" stroke-width="2.5" marker-end="url(#a2)"/>

    <rect x="765" y="280" width="140" height="78" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="835" y="306" class="lbl" text-anchor="middle">Profile B</text>
    <text x="835" y="326" class="port" text-anchor="middle" fill="#16a34a">:13336</text>
    <text x="835" y="345" class="lbl2" text-anchor="middle">live ✓</text>
    <line x1="835" y1="280" x2="835" y2="198" stroke="#16a34a" stroke-width="2.5" marker-end="url(#a2)"/>

    <rect x="918" y="280" width="140" height="78" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="988" y="306" class="lbl" text-anchor="middle">Profile C</text>
    <text x="988" y="326" class="port" text-anchor="middle" fill="#16a34a">:14820</text>
    <text x="988" y="345" class="lbl2" text-anchor="middle">live ✓</text>
    <line x1="970" y1="280" x2="890" y2="198" stroke="#16a34a" stroke-width="2.5" marker-end="url(#a2)"/>
  </g>

  <rect x="612" y="392" width="446" height="56" rx="10" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="632" y="416" class="lbl2">No quitting, no toggling, no waiting. Address any profile by name in</text>
  <text x="632" y="434" class="lbl2">the same call — they all stay connected, simultaneously.</text>
</svg>
